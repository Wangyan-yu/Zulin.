<!-- 首页 -->
<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
		<title>首页</title>
		<link rel="stylesheet" href="./layui/css/layui.css">
		<link rel="stylesheet" href="./xznstatic/css/common.css"/>
		<link rel="stylesheet" href="./xznstatic/css/style.css"/>
	</head>
	<style type="text/css">
		html, body {
			height: 100%;
		}
		#iframe {
			width: 100%;
			margin-top: 138px;
			padding-top: 0;
			min-height: 600px;
		}
		#header {
			height: auto;
			background: #fff;
			border-bottom: 0;
			position: fixed;
			top: 0;
			left: 0;
			width: 100%;
			z-index: 1000;
		}

		#header .nav-top {
			display: flex;
			align-items: center;
			padding: 0 20px;
			font-size: 16px;
			color: #2a8a15;
			box-sizing: border-box;
			height: 138px;
			background: linear-gradient(135deg, #333333 0%, #1a1a1a 100%);
			box-shadow: 0 3px 15px rgba(0,0,0,0.5);
			flex-direction: column;
			justify-content: center;
			position: relative;
			border-bottom: 1px solid rgba(255,255,255,0.1);
		}

		#header .nav-content {
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			width: 100%;
		}

		#header .nav-content .nav-top-title {
			line-height: 40px;
			font-size: 25px;
			font-weight: 700;
			color: rgba(255, 255, 255, 1);
			padding: 0 10px;
			margin: 0 0 20px 0;
			border-radius: 0;
			border-width: 0;
			border-style: solid;
			border-color: transparent;
			box-shadow: none;
		}

		#header .nav-content .navs {
			display: flex;
			padding: 0 20px;
			align-items: center;
			box-sizing: border-box;
			background-color: transparent;
			box-shadow: none;
			justify-content: center;
			margin: 0;
		}
		#header .nav-content .navs li {
			display: inline-block;
			width: auto;
			line-height: 40px;
			padding: 0 15px;
			margin: 0 5px;
			color: rgba(255, 255, 255, 1);
			font-size: 18px;
			border-radius: 0;
			border-width: 0;
			border-style: solid;
			border-color: transparent;
			background-color: transparent;
			box-shadow: none;
		  text-align: center;
		}
		#header .nav-content .navs li a{
			color: inherit;
			text-decoration: none;
			font-weight: 500;
			transition: all 0.3s;
			display: inline-block;
			position: relative;
		}
		#header .nav-content .navs li.current a{
			color: rgba(255, 255, 255, 1);
		}
		#header .nav-content .navs li a:hover{
			color: rgba(255, 255, 255, 1);
		}
		#header .nav-content .navs li.current {
			color: rgba(255, 255, 255, 1);
			font-size: 18px;
			border-radius: 0;
			border-width: 0;
			border-style: solid;
			border-color: transparent;
			background-color: transparent;
			box-shadow: none;
		}
		#header .nav-content .navs li:hover {
			color: rgba(255, 255, 255, 1);
			font-size: 18px;
			border-radius: 0;
			border-width: 0;
			border-style: solid;
			border-color: transparent;
			background-color: transparent;
			box-shadow: none;
		}
		#header .nav-content .navs li a::after {
			content: '';
			position: absolute;
			width: 0;
			height: 2px;
			bottom: -5px;
			left: 50%;
			background-color: rgba(255, 255, 255, 0.8);
			transition: all 0.3s ease;
			transform: translateX(-50%);
		}
		#header .nav-content .navs li a:hover::after {
			width: 80%;
		}
		#header .nav-content .navs li.current a::after {
			width: 80%;
			background-color: rgba(255, 255, 255, 1);
		}

		/* 响应式设计 */
		@media (max-width: 768px) {
			#header .nav-top {
				flex-direction: column;
				height: auto;
				padding: 20px;
			}
			
			#header .nav-content {
				width: 100%;
			}
			
			#header .nav-content .nav-top-title {
				margin-bottom: 15px;
				line-height: normal;
			}
			
			#header .nav-content .navs {
				width: 100%;
				justify-content: space-around;
			}
			
			#header .nav-content .navs li {
				margin: 0;
				line-height: normal;
			}
			
			#header .nav-content .navs li a {
				padding: 8px 15px;
				font-size: 15px;
			}
		}
	</style>
	<body>
		<!-- start 顶部导航栏 -->
		<div id="header">
			<div class="nav-top">
			  <div class="nav-content">
			    <div class="nav-top-title"><span>优居租房</span></div>
			    <div class="navs">
						<ul>
							<li class='current'><a href="javascript:navPage('./pages/home/home.html')" class="menumain">首页</a></li>
							<li v-for="(item,index) in indexNav" v-bind:key="index"><a :href="'javascript:navPage(\''+item.url+'\')'" class="menumain" style="cursor: pointer;">{{item.name}}</a></li>
							<li><a href="javascript:centerPage();" class="menumain">个人中心</a></li>
							<li><a :href="adminurl" target="_blank" class="menumain" style="cursor: pointer;">后台管理</a></li>
							<li v-if="cartFlag"><a href="javascript:navPage('./pages/shop-cart/list.html')" class="menumain">购物车</a></li>
							<li v-if="chatFlag"><a href="javascript:navPage('./pages/chat/chat-ai.html')" class="menumain">AI智能客服</a></li>
						</ul>
			    </div>
			  </div>
			</div>
		</div>
		<!-- end 顶部导航栏 -->

		<iframe src="./pages/home/home.html" id="iframe" frameborder="0" scrolling="no" width="100%" onload="changeFrameHeight"></iframe>

    <div id="tabbar" v-if="true" class="tabbar" :style='{"padding":"20px 0","boxShadow":"0 0 6px rgba(0,0,0,0.1)","margin":"10px 0 0 0","borderColor":"rgba(0,0,0,.3)","background":"linear-gradient(135deg, #f8f8f8 0%, #e0e0e0 100%)","borderRadius":"0","borderWidth":"0","borderStyle":"solid"}' style="position: relative;z-index: 999;">
      <img v-if='false' :style='{"boxShadow":"0 0 6px rgba(255,0,0,.8)","margin":"0 auto","borderColor":"rgba(0,0,0,.3)","borderRadius":"100%","borderWidth":"1px","width":"44px","borderStyle":"solid","height":"44px"}' style='display: block;' src='http://codegen.caihongy.cn/20201024/ed5e326ca66f403aa3197b5fbb4ec733.jpg' />
      <div :style='{"padding":"0 10px","boxShadow":"0 0 6px #F2F2F2","margin":"10px auto","borderColor":"rgba(242, 242, 242, 1)","backgroundColor":"rgba(242, 242, 242, 1)","color":"#fff","textAlign":"center","borderRadius":"0","borderWidth":"0","width":"100%","lineHeight":"32px","fontSize":"14px","borderStyle":"solid"}' class="company"></div>
      <div :style='{"padding":"0 10px","boxShadow":"0 0 6px #F2F2F2","margin":"10px auto","borderColor":"rgba(242, 242, 242, 1)","backgroundColor":"rgba(242, 242, 242, 1)","color":"rgba(64, 59, 59, 1)","textAlign":"center","borderRadius":"0","borderWidth":"0","width":"100%","lineHeight":"32px","fontSize":"14px","borderStyle":"solid"}' class="record"></div>
      <div :style='{"padding":"0 10px","boxShadow":"0 0 6px rgba(255,0,0,0)","margin":"10px auto 30px auto","borderColor":"rgba(255,255,255,1)","backgroundColor":"#000","color":"#fff","textAlign":"center","borderRadius":"0","borderWidth":"1px 0","width":"40%","lineHeight":"32px","fontSize":"14px","borderStyle":"solid"}' class="desc"></div>
    </div>

		<script src="./xznstatic/js/jquery-1.11.3.min.js"></script>
		<script src="./layui/layui.js"></script>
		<script src="./js/vue.js"></script>
		<script src="./js/config.js"></script>

		<script>
      var vue1 = new Vue({el: '#tabbar'})

			var vue = new Vue({
				el: '#header',
				data: {
					iconArr: ['layui-icon-gift','layui-icon-email','layui-icon-logout','layui-icon-transfer','layui-icon-slider','layui-icon-print','layui-icon-cols','layui-icon-snowflake','layui-icon-note','layui-icon-flag','layui-icon-theme','layui-icon-website','layui-icon-console','layui-icon-face-surprised','layui-icon-template-1','layui-icon-app','layui-icon-read','layui-icon-component','layui-icon-file-b','layui-icon-unlink','layui-icon-tabs','layui-icon-form','layui-icon-chat'],
					indexNav: indexNav,
					cartFlag: cartFlag,
					adminurl: adminurl,
					chatFlag: chatFlag,
					projectName: projectName,
				},
				mounted: function() {
					this.bindClickOnLi();
				},
				created() {
					this.iconArr.sort(()=>{
					  return (0.5-Math.random())
					})
				},
				methods: {
					jump(url) {
						jump(url)
					},
					bindClickOnLi() {
						let list = document.getElementsByTagName("li");
						for(var i = 0;i<list.length;i++){
							list[i].onclick = function(){
								$(this).addClass("current").siblings().removeClass("current");
							}
						}
					}
				}
			});

			layui.use(['element','layer'], function() {
				var element = layui.element;
				var layer = layui.layer;
			});

			function chatTap(){
				var userTable = localStorage.getItem('userTable');
				if (userTable) {
					layui.layer.open({
						type: 2,
						title: '在线客服',
						area: ['600px', '600px'],
						content: './pages/chat/chat.html'
					});
				} else {
					window.location.href = './pages/login/login.html'
				}
			}

			// 导航栏跳转
			function navPage(url) {
				localStorage.setItem('iframeUrl', url);
				var iframe = document.getElementById('iframe');
				iframe.src = url;
				// 添加错误处理
				iframe.onerror = function() {
					console.log('无法加载页面: ' + url);
				};
			}

			// 跳转到个人中心也
			function centerPage() {
				var userTable = localStorage.getItem('userTable');
				if (userTable) {
					localStorage.setItem('iframeUrl', './pages/' + userTable + '/center.html');
					var iframe = document.getElementById('iframe');
					iframe.src = './pages/' + userTable + '/center.html';
				} else {
					window.location.href = './pages/login/login.html'
				}
			}

      // var i = 0;
      setInterval(function(){
        // i++;
        // if(i<50) changeFrameHeight();
        changeFrameHeight();
      },200)

      function changeFrameHeight() {
        var iframe = document.getElementById('iframe');
        // iframe.height = 'auto';
          if (iframe) {
              var iframeWin = iframe.contentWindow || iframe.contentDocument.parentWindow;
              if (iframeWin.document.body) {
                  iframe.height = iframeWin.document.body.scrollHeight;
              }
          }
      };

			//  窗口变化时候iframe自适应
			// function changeFrameHeight() {
				// var header = document.getElementById('header').scrollHeight;
    //     let isshow = true
    //     var tabbar = 0
    //     if(isshow) {
    //       tabbar = document.getElementById('tabbar').scrollHeight
    //     }
				// var ifm = document.getElementById("iframe");
				// ifm.height = document.documentElement.clientHeight - header - tabbar;
				// ifm.width = document.documentElement.clientWidth;
			// }

			// reasize 事件 窗口大小变化后执行的方法
			window.onresize = function() {
				changeFrameHeight();
			}
		</script>
	</body>
</html>
